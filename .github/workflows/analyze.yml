name: AI Sales Analysis

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill ID'
        required: true
      target:
        description: 'Company or URL'
        required: true
      context:
        description: 'Additional context'
        required: false
        default: ''
      model:
        description: 'Claude model'
        required: false
        default: 'claude-sonnet-4-6'
      run_id:
        description: 'Unique run ID'
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKILL: ${{ inputs.skill }}
          TARGET: ${{ inputs.target }}
          CONTEXT: ${{ inputs.context }}
          MODEL: ${{ inputs.model }}
          RUN_ID: ${{ inputs.run_id }}
        run: node .github/scripts/analyze.js

      - name: Commit and push result
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add data/results/
          git diff --staged --quiet || git commit -m "analysis: ${{ inputs.run_id }}"
          git push

      - name: Cleanup old results (>24h)
        run: |
          find data/results/ -name "*.json" -mmin +1440 -delete 2>/dev/null || true
          git add data/results/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "cleanup: old analysis results"
          git push || true
